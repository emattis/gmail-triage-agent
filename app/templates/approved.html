<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Approvals Saved</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #F8FAFC; color: #0F172A;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh; gap: 16px;
    }
    .icon { font-size: 32px; }
    h2 { font-size: 18px; font-weight: 600; }
    p { font-size: 14px; color: #64748B; }
    .links { display: flex; gap: 10px; margin-top: 8px; }
    a {
      padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 500;
      text-decoration: none; border: 1px solid #E2E8F0;
      background: #fff; color: #0F172A;
    }
    a.primary { background: #0F172A; color: #fff; border-color: #0F172A; }
  </style>
</head>
<body>
  <div class="icon">✓</div>
  <h2>{{ count }} approval{{ "s" if count != 1 else "" }} saved</h2>
  <p>Batch: {{ batch_id }}</p>
  <div class="links">
    <a href="/triage/ui">New Triage ↺</a>
    <a href="/triage/approvals?batch_id={{ batch_id }}">View Approvals</a>
    <form method="post" action="/triage/apply" style="display:contents">
      <input type="hidden" name="batch_id" value="{{ batch_id }}">
      <button type="submit" style="padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;border:1px solid #0F172A;background:#0F172A;color:#fff;cursor:pointer;">
        Apply to Gmail ↗
      </button>
    </form>
  </div>
</body>
</html>
