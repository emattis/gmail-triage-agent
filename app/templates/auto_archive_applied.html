<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Archived — Gmail Agent</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #F8FAFC; color: #0F172A;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 100vh; gap: 16px;
    }
    .icon { font-size: 40px; }
    h2 { font-size: 20px; font-weight: 600; }
    .stats { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; margin-top: 8px; }
    .stat {
      background: #fff; border: 1px solid #E2E8F0; border-radius: 12px;
      padding: 16px 24px; text-align: center; min-width: 90px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    }
    .stat-num { font-size: 28px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
    .stat-num--archived { color: #059669; }
    .stat-num--skipped  { color: #94A3B8; }
    .stat-num--errors   { color: #DC2626; }
    .stat-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #94A3B8; }
    .error-list {
      background: #FEF2F2; border: 1px solid #FECACA; border-radius: 10px;
      padding: 14px 18px; max-width: 480px; width: 100%;
    }
    .error-list p { font-size: 12px; color: #991B1B; margin-bottom: 4px; }
    .actions { display: flex; gap: 10px; margin-top: 8px; }
    .btn {
      padding: 9px 20px; border-radius: 8px; font-size: 13px; font-weight: 500;
      cursor: pointer; border: 1px solid transparent; text-decoration: none;
      display: inline-flex; align-items: center; gap: 4px;
    }
    .btn--primary { background: #0F172A; color: #fff; border-color: #0F172A; }
    .btn--outline { background: #fff; color: #374151; border-color: #D1D5DB; }
  </style>
</head>
<body>
  <div class="icon">✓</div>
  <h2>Auto-archive complete</h2>

  <div class="stats">
    <div class="stat">
      <div class="stat-num stat-num--archived">{{ archived }}</div>
      <div class="stat-label">Archived</div>
    </div>
    <div class="stat">
      <div class="stat-num stat-num--skipped">{{ skipped }}</div>
      <div class="stat-label">Kept</div>
    </div>
    {% if errors %}
    <div class="stat">
      <div class="stat-num stat-num--errors">{{ errors|length }}</div>
      <div class="stat-label">Errors</div>
    </div>
    {% endif %}
  </div>

  {% if errors %}
  <div class="error-list">
    {% for e in errors %}
    <p>{{ e.message_id }}: {{ e.error }}</p>
    {% endfor %}
  </div>
  {% endif %}

  <div class="actions">
    <a href="/triage/ui" class="btn btn--primary">← Back to Triage</a>
    <a href="/auto-archive" class="btn btn--outline">Edit Rules</a>
  </div>
</body>
</html>
