<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Triage — Gmail Agent</title>
  <script src="https://unpkg.com/htmx.org@2.0.3" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #F8FAFC; color: #0F172A;
      min-height: 100vh; font-size: 14px; line-height: 1.5;
    }
    .header {
      background: #FFFFFF; border-bottom: 1px solid #E2E8F0;
      padding: 14px 24px; display: flex; align-items: center;
      justify-content: space-between; position: sticky; top: 0; z-index: 100;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .app-title { font-size: 16px; font-weight: 600; letter-spacing: -0.02em; }
    .badge {
      padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 500;
      background: #F1F5F9; color: #64748B; text-transform: uppercase; letter-spacing: 0.03em;
    }
    .header-right { display: flex; gap: 8px; align-items: center; }
    .btn {
      padding: 6px 13px; border-radius: 8px; font-size: 13px; font-weight: 500;
      cursor: pointer; border: 1px solid #D1D5DB; background: #fff;
      color: #374151; text-decoration: none; display: inline-flex; align-items: center; gap: 4px;
    }
    .btn:hover { background: #F9FAFB; }

    /* Loading state */
    .loading-wrap {
      max-width: 820px; margin: 0 auto; padding: 60px 20px;
      display: flex; flex-direction: column; align-items: center; gap: 16px;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #E2E8F0;
      border-top-color: #0F172A;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-label {
      font-size: 14px; color: #64748B; font-weight: 500;
    }
    .loading-sub {
      font-size: 12px; color: #94A3B8;
    }

    /* Skeleton cards */
    .skeleton-wrap {
      max-width: 820px; margin: 0 auto; padding: 0 20px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .skeleton-card {
      background: #FFFFFF; border: 1px solid #E2E8F0;
      border-left: 4px solid #E2E8F0;
      border-radius: 12px; padding: 16px 18px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    }
    .skel {
      background: linear-gradient(90deg, #F1F5F9 25%, #E8EDF2 50%, #F1F5F9 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }
    .skel-row { display: flex; gap: 8px; margin-bottom: 10px; }
    .skel-pill { height: 20px; width: 72px; }
    .skel-conf { height: 20px; width: 48px; }
    .skel-title { height: 18px; width: 65%; margin-bottom: 8px; }
    .skel-meta { height: 14px; width: 40%; margin-bottom: 8px; }
    .skel-text { height: 13px; width: 90%; margin-bottom: 5px; }
    .skel-text-short { height: 13px; width: 70%; }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-left">
      <span class="app-title">Gmail Triage</span>
      <span class="badge" id="mode-badge">loading</span>
    </div>
    <div class="header-right">
      <a href="/auto-archive" class="btn">Auto-Archive</a>
      <a href="/analytics" class="btn">Analytics</a>
      <a href="/triage/ui" class="btn">↺ Refresh</a>
    </div>
  </header>

  <!-- HTMX loads the real content, replaces this entire div -->
  <div
    id="triage-content"
    hx-get="/triage/load?max_results={{ max_results }}"
    hx-trigger="load"
    hx-swap="outerHTML"
    hx-indicator="#loading-indicator"
  >
    <!-- Loading label -->
    <div class="loading-wrap" id="loading-indicator">
      <div class="spinner"></div>
      <div class="loading-label">Fetching your inbox…</div>
      <div class="loading-sub">Running AI triage in the background</div>
    </div>

    <!-- Skeleton cards while waiting -->
    <div class="skeleton-wrap">
      {% for _ in range(5) %}
      <div class="skeleton-card">
        <div class="skel-row">
          <div class="skel skel-pill"></div>
          <div class="skel skel-conf"></div>
        </div>
        <div class="skel skel-title"></div>
        <div class="skel skel-meta"></div>
        <div class="skel skel-text"></div>
        <div class="skel skel-text-short"></div>
      </div>
      {% endfor %}
    </div>
  </div>

</body>
</html>
